<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطة الـ 100% - امتحان الأطفال</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .task-checkbox:checked + div { text-decoration: line-through; color: #9ca3af; }
        .task-checkbox:checked + div + .check-icon { display: block; }
        .day-card { transition: all 0.3s ease; }
        .day-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        #progress-fill { transition: width 0.5s ease-in-out; }
        #loading-overlay { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loading-overlay">
        <div class="spinner mb-4"></div>
        <p class="text-blue-600 font-bold" id="loading-text">جاري الاتصال بالنظام...</p>
    </div>

    <div id="login-section" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-2xl shadow-xl text-center border-t-4 border-blue-600" style="display: none;">
        <div class="mb-6 text-blue-600 text-5xl"><i class="fas fa-user-md"></i></div>
        <h2 class="text-2xl font-bold mb-2 text-gray-800">المنصة الدراسية</h2>
        <p class="text-gray-500 mb-8 text-sm">قم بتسجيل الدخول بحساب جوجل لحفظ ومزامنة تقدمك بأمان لضمان علامة الـ 100%.</p>
        
        <button onclick="loginWithGoogle()" class="w-full bg-white hover:bg-gray-50 text-gray-800 font-bold py-3 px-4 rounded-lg shadow border border-gray-300 flex justify-center items-center gap-3 transition-colors">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" class="w-5 h-5">
            <span>تسجيل الدخول باستخدام Google</span>
        </button>
    </div>

    <div id="main-content" class="max-w-4xl mx-auto" style="display: none;">
        <header class="bg-blue-600 text-white rounded-2xl p-6 mb-8 shadow-lg text-center relative">
            <button onclick="logoutUser()" class="absolute top-4 left-4 bg-white/20 hover:bg-white/30 text-white text-sm py-1 px-3 rounded-full transition-colors backdrop-blur-sm">
                <i class="fas fa-sign-out-alt ml-1"></i> خروج
            </button>
            <div class="mt-4 text-sm text-blue-200 mb-2 flex justify-center items-center gap-2">
                <img id="user-photo" src="" class="w-8 h-8 rounded-full border border-white">
                <span id="display-name" class="font-semibold"></span>
            </div>
            <h1 class="text-3xl font-bold mb-2"><i class="fas fa-stethoscope ml-2"></i> خطة الـ 100% - الأطفال (Pediatrics)</h1>
            <p class="text-blue-100 text-lg">من 22/3 إلى 31/3 | امتحان النظري: 1/4</p>
            <div class="mt-6 bg-blue-800 rounded-full h-4 w-full overflow-hidden">
                <div id="progress-fill" class="bg-green-400 h-full w-0 rounded-full"></div>
            </div>
            <p class="mt-2 text-sm font-semibold" id="progress-text">نسبة الإنجاز الكلية: 0%</p>
            <p class="mt-1 text-xs text-green-200 h-4" id="save-status"></p>
        </header>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="days-container"></div>
        <div class="mt-8 flex justify-center gap-4 mb-10">
            <button onclick="resetProgress()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-6 rounded-lg transition-colors shadow-md">
                <i class="fas fa-undo ml-2"></i> إعادة ضبط الخطة
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCs-ho-vGUbUpPYd9WRlcAtdLxuRkvf5f4",
            authDomain: "pediatrics-app.firebaseapp.com",
            projectId: "pediatrics-app",
            storageBucket: "pediatrics-app.firebasestorage.app",
            messagingSenderId: "925584354091",
            appId: "1:925584354091:web:508c47a0f5294d426bb36e",
            measurementId: "G-H575VSQTJR"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const planData = [
            { date: "اليوم 1 (22/3)", title: "حجر الأساس (General Peds)", tasks: ["قراءة UW Notes: Growth, Nutrition, Vaccines (3 ساعات)", "UWorld (Tutor/Unused): General Principles & Psychiatry (4 ساعات)", "مراجعة سريعة لأخطاء اليوم أو حل نموذج مصغر (ساعتان)"] },
            { date: "اليوم 2 (23/3)", title: "حديثي الولادة (Neonatology)", tasks: ["قراءة UW Notes: NRP, RDS, Jaundice, Sepsis (3 ساعات)", "UWorld (Tutor/Unused): Pregnancy, Childbirth & Puerperium (4 ساعات)", "حل 20 سؤال CMS أطفال (ساعتان)"] },
            { date: "اليوم 3 (24/3)", title: "الأمراض المعدية (Infectious Diseases)", tasks: ["قراءة UW Notes: Meningitis, Exanthems, Kawasaki (3 ساعات)", "UWorld (Tutor/Unused): Infectious Diseases (4 ساعات)", "مراجعة جداول التطعيمات والـ Milestones (ساعتان)"] },
            { date: "اليوم 4 (25/3)", title: "التنفسي والقلب (Pulmonology & Cardiology)", tasks: ["قراءة UW Notes: Asthma, Bronchiolitis, CHD (3 ساعات)", "UWorld (Tutor/Unused): Pulmonary & Cardiovascular (4 ساعات)", "حل 20 سؤال CMS أطفال (ساعتان)"] },
            { date: "اليوم 5 (26/3)", title: "الجهاز الهضمي (Gastroenterology)", tasks: ["قراءة UW Notes: Dehydration (IV Fluids), Intussusception (3 ساعات)", "UWorld (Tutor/Unused): Gastrointestinal & Nutrition (4 ساعات)", "التدرب على حسابات السوائل (Maintenance & Deficit) (ساعتان)"] },
            { date: "اليوم 6 (27/3)", title: "الأعصاب والطب النفسي (Neurology & Psychiatry)", tasks: ["قراءة UW Notes: Seizures, CP, Autism (3 ساعات)", "UWorld (Tutor/Unused): Nervous System (4 ساعات)", "حل 20 سؤال CMS أطفال (ساعتان)"] },
            { date: "اليوم 7 (28/3)", title: "أمراض الدم والأورام (Hematology & Oncology)", tasks: ["قراءة UW Notes: Anemias, Bleeding, Leukemia (3 ساعات)", "UWorld (Tutor/Unused): Hematology, Oncology & Immunology (4 ساعات)", "مراجعة خوارزميات الـ Anemia (ساعتان)"] },
            { date: "اليوم 8 (29/3)", title: "الكلى، الغدد، الجينات (Nephro, Endo, Genetics)", tasks: ["قراءة UW Notes: Nephrotic/Nephritic, UTI, DKA, Syndromes (3 ساعات)", "UWorld (Tutor/Unused): Renal, Endocrine & Genetics (4 ساعات)", "حل 20 سؤال CMS أطفال (ساعتان)"] },
            { date: "اليوم 9 (30/3)", title: "المحاكاة الشاملة (Mock Exams)", tasks: ["UWorld (Timed/Incorrects): Select ALL Systems (40 سؤال)", "حل نموذج CMS أطفال كامل (Shelf Exam) - Timed", "مراجعة أخطاء الـ CMS والـ UWorld بدقة"] },
            { date: "اليوم 10 (31/3)", title: "يوم الطوارئ (The Day Before)", tasks: ["مراجعة سريعة جداً للصور (X-rays, Rashes) في الـ UWorld", "مراجعة القوانين والجرعات السريعة (بدون أسئلة جديدة)", "تجهيز أدوات الامتحان والنوم مبكراً (أهم مهمة!)"] }
        ];

        let currentUser = null;
        let taskState = {};
        let saveTimeout = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('display-name').innerText = user.displayName || user.email;
                document.getElementById('user-photo').src = user.photoURL || 'https://via.placeholder.com/150';
                document.getElementById('login-section').style.display = 'none';
                
                loadUserData(user.uid);
            } else {
                currentUser = null;
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('login-section').style.display = 'block';
            }
        });

        function loginWithGoogle() {
            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('loading-text').innerText = "جاري تحويلك لجوجل...";
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(error => {
                console.error("Login Error:", error);
                alert("تعذر فتح نافذة تسجيل الدخول. يرجى التأكد من عدم حظر النوافذ المنبثقة.");
                document.getElementById('loading-overlay').style.display = 'none';
            });
        }

        async function loadUserData(userId) {
            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('loading-text').innerText = "جاري تحميل تقدمك...";
            try {
                const doc = await db.collection("users").doc(userId).get();
                if (doc.exists && doc.data().tasks) {
                    taskState = doc.data().tasks;
                } else {
                    taskState = {};
                }
            } catch (error) {
                console.error("Firestore Error:", error);
                alert("ملاحظة: حدث خطأ في الاتصال بقاعدة البيانات. (" + error.message + ")");
                taskState = {}; // لتستمر في الدراسة حتى لو فشل الاتصال بالقاعدة
            } finally {
                // هذا السطر سُيجبر الصفحة على الفتح سواء نجح الاتصال بالقاعدة أو فشل
                renderDays();
                updateProgress();
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        function renderDays() {
            const container = document.getElementById('days-container');
            container.innerHTML = ''; 
            planData.forEach((day, dayIndex) => {
                const dayCard = document.createElement('div');
                dayCard.className = 'day-card bg-white rounded-xl shadow-md p-6 border-t-4 border-blue-500';
                let tasksHtml = '';
                day.tasks.forEach((task, taskIndex) => {
                    const taskId = `day${dayIndex}_task${taskIndex}`;
                    const isChecked = taskState[taskId] ? 'checked' : '';
                    tasksHtml += `
                        <label class="flex items-start gap-3 p-3 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors border-b border-gray-100 last:border-0 relative">
                            <div class="mt-1 relative flex-shrink-0">
                                <input type="checkbox" class="task-checkbox appearance-none w-6 h-6 border-2 border-gray-300 rounded-md checked:bg-green-500 checked:border-green-500 transition-colors cursor-pointer" 
                                       id="${taskId}" ${isChecked} onchange="toggleTask('${taskId}')">
                                <i class="fas fa-check text-white absolute top-1 right-1 text-sm pointer-events-none check-icon ${isChecked ? 'block' : 'hidden'}"></i>
                            </div>
                            <div class="text-gray-700 font-medium ${isChecked ? 'line-through text-gray-400' : ''}" id="text_${taskId}">${task}</div>
                        </label>`;
                });
                dayCard.innerHTML = `<div class="flex justify-between items-center border-b pb-3 mb-4"><h2 class="text-xl font-bold text-gray-800">${day.date}</h2><span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded">${day.title}</span></div><div class="space-y-1">${tasksHtml}</div>`;
                container.appendChild(dayCard);
            });
        }

        function toggleTask(taskId) {
            const checkbox = document.getElementById(taskId);
            const textElement = document.getElementById(`text_${taskId}`);
            const icon = checkbox.nextElementSibling;
            taskState[taskId] = checkbox.checked;
            
            if (checkbox.checked) {
                textElement.classList.add('line-through', 'text-gray-400');
                icon.classList.remove('hidden');
            } else {
                textElement.classList.remove('line-through', 'text-gray-400');
                icon.classList.add('hidden');
            }
            updateProgress();
            saveToFirestore();
        }

        function updateProgress() {
            const totalTasks = planData.reduce((acc, day) => acc + day.tasks.length, 0);
            const completedTasks = Object.values(taskState).filter(val => val === true).length;
            const percentage = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);
            document.getElementById('progress-fill').style.width = `${percentage}%`;
            document.getElementById('progress-text').innerText = `نسبة الإنجاز الكلية: ${percentage}% (${completedTasks} من ${totalTasks} مهام)`;
        }

        function saveToFirestore() {
            if (!currentUser) return;
            document.getElementById('save-status').innerText = "جاري المزامنة...";
            clearTimeout(saveTimeout);
            
            saveTimeout = setTimeout(async () => {
                try {
                    await db.collection("users").doc(currentUser.uid).set({
                        email: currentUser.email,
                        tasks: taskState,
                        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                    document.getElementById('save-status').innerText = "✔ تمت المزامنة بنجاح";
                    setTimeout(() => document.getElementById('save-status').innerText = "", 3000);
                } catch (error) {
                    console.error("Error saving:", error);
                    document.getElementById('save-status').innerText = "❌ فشلت المزامنة";
                }
            }, 1000); 
        }

        async function resetProgress() {
            if(confirm("هل أنت متأكد أنك تريد مسح جميع إنجازاتك والبدء من جديد؟")) {
                taskState = {};
                renderDays();
                updateProgress();
                saveToFirestore();
            }
        }

        function logoutUser() {
            auth.signOut().then(() => {
                taskState = {};
            });
        }
    </script>
</body>
</html>
