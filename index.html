<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطة الـ 100% - د. محمد زهور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; padding-bottom: 80px; scroll-behavior: smooth;}
        .task-checkbox:checked + div { text-decoration: line-through; color: #9ca3af; }
        .day-card { transition: all 0.3s ease; }
        #progress-fill { transition: width 0.5s ease-in-out; }
        #loading-overlay { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #zen-mode-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 2000; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .msg-user { background-color: #4f46e5; color: white; border-radius: 1rem 1rem 0 1rem; align-self: flex-end; max-width: 85%; }
        .msg-ai { background-color: #ffffff; color: #1f2937; border-radius: 1rem 1rem 1rem 0; border: 1px solid #e2e8f0; align-self: flex-start; max-width: 85%; }
    </style>
</head>
<body class="p-4 md:p-8">

<div id="loading-overlay"><div class="spinner mb-4"></div><p class="text-blue-600 font-bold">جاري تحميل المنصة الذكية...</p></div>

<div id="login-section" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-2xl shadow-xl text-center border-t-4 border-blue-600" style="display: none;">
    <div class="mb-6 text-blue-600 text-5xl"><i class="fas fa-user-md"></i></div>
    <h2 class="text-2xl font-bold mb-2">منصة د. محمد زهور</h2>
    <button onclick="loginWithGoogle()" class="w-full bg-white hover:bg-gray-50 text-gray-800 font-bold py-3 px-4 rounded-lg shadow border border-gray-300 flex justify-center items-center gap-3 mt-4">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" class="w-5 h-5">
        <span>الدخول بحساب Google</span>
    </button>
</div>

<div id="main-content" class="max-w-4xl mx-auto" style="display: none;">
    <header class="bg-blue-600 text-white rounded-2xl p-6 mb-8 shadow-lg text-center relative">
        <button onclick="auth.signOut()" class="absolute top-4 left-4 bg-white/20 p-2 rounded-full"><i class="fas fa-sign-out-alt"></i></button>
        <div class="mt-4 flex justify-center items-center gap-2 mb-2"><img id="user-photo" src="" class="w-8 h-8 rounded-full border border-white"><span id="display-name" class="font-semibold text-sm"></span></div>
        <h1 class="text-2xl font-bold mb-1">خطة الـ 10 أيام - Pediatrics</h1>
        <div class="mt-4 bg-blue-800 rounded-full h-3 w-full overflow-hidden"><div id="progress-fill" class="bg-green-400 h-full w-0"></div></div>
        <p class="mt-2 text-xs font-semibold" id="progress-text">نسبة الإنجاز: 0%</p>
    </header>

    <div class="bg-white rounded-2xl shadow-lg mb-8 border border-indigo-100 flex flex-col overflow-hidden">
        <div class="bg-indigo-600 p-3 text-white flex items-center justify-between font-bold">
            <span><i class="fas fa-robot mr-2"></i> المستشار الطبي الذكي</span>
            <button onclick="chatHistory=[]" class="text-xs opacity-70">مسح الذاكرة</button>
        </div>
        <div id="chat-box" class="h-64 overflow-y-auto p-4 flex flex-col gap-3 bg-gray-50">
            <div class="msg-ai p-3 text-sm italic">بانتظار سؤالك يا دكتور...</div>
        </div>
        <div class="p-3 border-t flex items-center gap-2">
            <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="handleImage(event)">
            <button onclick="document.getElementById('image-upload').click()" class="text-gray-400 p-2"><i class="fas fa-paperclip"></i></button>
            <input id="chat-input" class="flex-1 bg-gray-100 rounded-lg p-2 text-sm outline-none" placeholder="اسأل عن أي موضوع طبي...">
            <button onclick="sendChatMessage()" id="send-btn" class="bg-indigo-600 text-white p-2 rounded-lg w-10 h-10"><i class="fas fa-paper-plane"></i></button>
        </div>
        <div id="img-prev-box" class="hidden px-4 pb-2"><img id="img-prev" class="h-10 rounded border"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="days-container"></div>
    <button onclick="resetProgress()" class="block mx-auto mt-8 text-gray-400 text-xs underline">إعادة ضبط جميع المهام</button>
</div>

<div id="pomodoro-bar" class="fixed bottom-0 left-0 w-full bg-slate-800 text-white p-3 flex justify-between items-center shadow-2xl z-50" onclick="document.getElementById('zen-mode-overlay').style.display='flex'">
    <span class="text-sm font-bold"><i class="fas fa-expand mr-2"></i> وضع التركيز (Zen Mode)</span>
    <span id="mini-timer" class="font-mono font-bold">50:00</span>
</div>

<div id="zen-mode-overlay">
    <button onclick="event.stopPropagation(); this.parentElement.style.display='none'" class="absolute top-8 right-8 text-3xl"><i class="fas fa-times"></i></button>
    <div class="text-center">
        <div id="zen-timer" class="text-8xl font-bold mb-8">50:00</div>
        <button id="zen-play-btn" onclick="event.stopPropagation(); toggleZenTimer()" class="w-20 h-20 bg-blue-600 rounded-full text-3xl mb-8"><i id="zen-icon" class="fas fa-play"></i></button>
        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
            <p class="mb-2 text-sm">أصوات هادئة:</p>
            <select id="audio-sel" onchange="event.stopPropagation(); changeAudio(this.value)" class="bg-slate-900 text-white p-2 rounded text-sm">
                <option value="">بدون صوت</option>
                <option value="https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg">صوت المطر</option>
                <option value="https://actions.google.com/sounds/v1/water/waves_crashing_on_rock_beach.ogg">أمواج البحر</option>
            </select>
        </div>
    </div>
</div>
<audio id="bg-audio" loop></audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCs-ho-vGUbUpPYd9WRlcAtdLxuRkvf5f4",
        authDomain: "pediatrics-app.firebaseapp.com",
        projectId: "pediatrics-app",
        storageBucket: "pediatrics-app.firebasestorage.app",
        messagingSenderId: "925584354091",
        appId: "1:925584354091:web:508c47a0f5294d426bb36e"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(); const db = firebase.firestore();
    const GEMINI_KEY = "AIzaSyB3gLTidHFKIkYzkLDPLs3aO_5Evw6JQhs";

    const planData = [
        { d: "اليوم 1 (22/3)", t: "حجر الأساس والوقاية", s: ["Growth & Dev (Milestones)", "Nutrition & Vaccines", "Child Abuse", "UWorld: General Principles & Psych"] },
        { d: "اليوم 2 (23/3)", t: "حديثي الولادة (الأهم)", s: ["NRP Algorithm", "RDS vs TTN vs MAS", "Neonatal Jaundice & Sepsis", "UWorld: Pregnancy & Childbirth"] },
        { d: "اليوم 3 (24/3)", t: "الأمراض المعدية", s: ["Meningitis (CSF)", "Viral Exanthems", "Kawasaki Disease", "Bone/Joint Infections"] },
        { d: "اليوم 4 (25/3)", t: "التنفسي والقلب", s: ["Asthma & CF", "Croup & Epiglottitis", "Congenital Heart Diseases", "Murmurs"] },
        { d: "اليوم 5 (26/3)", t: "الهضمي والتغذية", s: ["Dehydration (Fluids)", "Pyloric Stenosis & Hirschsprung", "Intussusception", "Gastro & Nutrition"] },
        { d: "اليوم 6 (27/3)", t: "الأعصاب والنفسية", s: ["Seizures (Febrile)", "Cerebral Palsy", "Neurocutaneous Syndromes", "ADHD & Autism"] },
        { d: "اليوم 7 (28/3)", t: "الدم والأورام", s: ["Anemias (Mentzer index)", "Bleeding (Hemophilia)", "ALL & Wilms Tumor", "Immunodeficiencies"] },
        { d: "اليوم 8 (29/3)", t: "الكلى والغدد", s: ["Nephrotic vs Nephritic", "DKA Management", "Down & Turner Syndromes", "Endo & Genetics"] },
        { d: "اليوم 9 (30/3)", t: "المحاكاة الشاملة", s: ["UWorld Timed Incorrects", "CMS Shelf Exam (Timed)", "Review NBME patterns"] },
        { d: "اليوم 10 (31/3)", t: "يوم الطوارئ", s: ["Rapid Review Tables", "UWorld Image/Flashcards", "APGAR & Fluids Review", "النوم 8 ساعات"] }
    ];

    let taskState = {}; let chatHistory = []; let pendingImg = null;
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('display-name').innerText = user.displayName;
            document.getElementById('user-photo').src = user.photoURL;
            document.getElementById('login-section').style.display = 'none';
            db.collection("users").doc(user.uid).get().then(doc => {
                if(doc.exists) taskState = doc.data().tasks || {};
                renderPlan(); updateProg();
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('loading-overlay').style.display = 'none';
            });
        } else {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('loading-overlay').style.display = 'none';
        }
    });

    function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(e => alert("تأكد من السماح بالمنبثقات (Pop-ups)"));
    }

    function renderPlan() {
        const cont = document.getElementById('days-container'); cont.innerHTML = '';
        planData.forEach((day, idx) => {
            let tasks = day.s.map((s, si) => {
                const id = `d${idx}s${si}`; const chk = taskState[id] ? 'checked' : '';
                return `<label class="flex items-start gap-2 p-2 border-b border-gray-50 text-xs"><input type="checkbox" ${chk} onchange="toggleT('${id}', this.checked)"> <div class="${chk?'line-through text-gray-400':''}">${s}</div></label>`;
            }).join('');
            cont.innerHTML += `<div class="day-card bg-white rounded-xl shadow-sm p-4 border-t-4 border-blue-500"><h3 class="font-bold text-sm mb-1">${day.d}</h3><p class="text-[10px] text-blue-600 mb-2">${day.t}</p>${tasks}</div>`;
        });
    }

    function toggleT(id, val) {
        taskState[id] = val; updateProg(); renderPlan();
        db.collection("users").doc(auth.currentUser.uid).set({tasks: taskState}, {merge:true});
    }

    function updateProg() {
        const total = planData.reduce((acc, d) => acc + d.s.length, 0);
        const done = Object.values(taskState).filter(v => v).length;
        const p = Math.round((done/total)*100);
        document.getElementById('progress-fill').style.width = p+'%';
        document.getElementById('progress-text').innerText = `نسبة الإنجاز: ${p}% (${done}/${total})`;
    }

    // Chat Logic
    function handleImage(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader(); reader.onload = (re) => {
            pendingImg = re.target.result.split(',')[1];
            document.getElementById('img-prev').src = re.target.result;
            document.getElementById('img-prev-box').classList.remove('hidden');
        }; reader.readAsDataURL(file);
    }

    async function sendChatMessage() {
        const inp = document.getElementById('chat-input'); const txt = inp.value.trim();
        if(!txt && !pendingImg) return;
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div class="msg-user p-2 text-xs">${txt}</div>`;
        inp.value = ''; document.getElementById('img-prev-box').classList.add('hidden');
        
        let parts = [{text: txt}]; if(pendingImg) parts.push({inlineData: {data: pendingImg, mimeType: "image/jpeg"}});
        chatHistory.push({role: "user", parts}); pendingImg = null;

        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({contents: chatHistory, systemInstruction: {parts: [{text: "أنت أستاذ طب أطفال خبير، أجب بدقة طبية عالية للدكتور محمد زهور."}]}})
            });
            const data = await resp.json();
            const aiTxt = data.candidates[0].content.parts[0].text;
            chatHistory.push({role: "model", parts: [{text: aiTxt}]});
            box.innerHTML += `<div class="msg-ai p-2 text-xs">${aiTxt.replace(/\n/g, '<br>')}</div>`;
            box.scrollTop = box.scrollHeight;
        } catch(e) { box.innerHTML += `<div class="msg-ai p-2 text-xs text-red-500 font-bold">❌ خطأ في الاتصال بالسيرفر، تأكد من مفتاح API</div>`; }
    }

    // Zen Timer
    let timer; let tLeft = 50*60; let tRun = false;
    function toggleZenTimer() {
        const btn = document.getElementById('zen-play-btn'); const icon = document.getElementById('zen-icon');
        if(tRun) { clearInterval(timer); icon.className = "fas fa-play"; }
        else {
            icon.className = "fas fa-pause";
            timer = setInterval(() => {
                tLeft--; const m = Math.floor(tLeft/60); const s = tLeft%60;
                const str = `${m}:${s<10?'0'+s:s}`;
                document.getElementById('zen-timer').innerText = str;
                document.getElementById('mini-timer').innerText = str;
                if(tLeft<=0) { clearInterval(timer); alert("انتهت الجلسة!"); }
            }, 1000);
        }
        tRun = !tRun;
    }
    function changeAudio(url) { 
        const aud = document.getElementById('bg-audio');
        if(!url) aud.pause(); else { aud.src = url; aud.play(); }
    }
</script>
</body>
</html>
