<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطة الـ 100% - المساعد الذكي للأطفال</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; padding-bottom: 80px; }
        .task-checkbox:checked + div { text-decoration: line-through; color: #9ca3af; }
        .task-checkbox:checked + div + .check-icon { display: block; }
        .day-card { transition: all 0.3s ease; }
        .day-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        #progress-fill { transition: width 0.5s ease-in-out; }
        #loading-overlay { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* تصميم زر التكرار المتباعد */
        .hard-btn.active { color: #ef4444; background-color: #fee2e2; border-color: #ef4444; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loading-overlay">
        <div class="spinner mb-4"></div>
        <p class="text-blue-600 font-bold" id="loading-text">جاري الاتصال بالنظام الذكي...</p>
    </div>

    <div id="login-section" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-2xl shadow-xl text-center border-t-4 border-blue-600" style="display: none;">
        <div class="mb-6 text-blue-600 text-5xl"><i class="fas fa-brain"></i></div>
        <h2 class="text-2xl font-bold mb-2 text-gray-800">المساعد الدراسي الذكي</h2>
        <p class="text-gray-500 mb-8 text-sm">سجل دخولك لتفعيل خوارزميات التكرار المتباعد ومؤقت بومودورو وحفظ تقدمك سحابياً.</p>
        
        <button onclick="loginWithGoogle()" class="w-full bg-white hover:bg-gray-50 text-gray-800 font-bold py-3 px-4 rounded-lg shadow border border-gray-300 flex justify-center items-center gap-3 transition-colors">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" class="w-5 h-5">
            <span>تسجيل الدخول باستخدام Google</span>
        </button>
    </div>

    <div id="main-content" class="max-w-4xl mx-auto" style="display: none;">
        <header class="bg-blue-600 text-white rounded-2xl p-6 mb-8 shadow-lg text-center relative">
            <button onclick="logoutUser()" class="absolute top-4 left-4 bg-white/20 hover:bg-white/30 text-white text-sm py-1 px-3 rounded-full transition-colors backdrop-blur-sm">
                <i class="fas fa-sign-out-alt ml-1"></i> خروج
            </button>
            <div class="mt-4 text-sm text-blue-200 mb-2 flex justify-center items-center gap-2">
                <img id="user-photo" src="" class="w-8 h-8 rounded-full border border-white">
                <span id="display-name" class="font-semibold"></span>
            </div>
            <h1 class="text-3xl font-bold mb-2"><i class="fas fa-stethoscope ml-2"></i> خطة الـ 100% - الأطفال</h1>
            
            <div class="flex justify-center gap-6 mt-4 text-sm border-t border-blue-500 pt-4 pb-2">
                <div class="flex flex-col items-center"><i class="fas fa-clock text-xl text-yellow-300 mb-1"></i><span><span id="stat-hours" class="font-bold text-lg">0</span> ساعة دراسة</span></div>
                <div class="flex flex-col items-center"><i class="fas fa-fire text-xl text-red-300 mb-1"></i><span><span id="stat-hard" class="font-bold text-lg">0</span> مهام للمراجعة</span></div>
            </div>

            <div class="mt-4 bg-blue-800 rounded-full h-4 w-full overflow-hidden">
                <div id="progress-fill" class="bg-green-400 h-full w-0 rounded-full"></div>
            </div>
            <p class="mt-2 text-sm font-semibold" id="progress-text">نسبة الإنجاز الكلية: 0%</p>
            <p class="mt-1 text-xs text-green-200 h-4" id="save-status"></p>
        </header>

        <div id="smart-review-container" class="mb-8" style="display: none;">
            <div class="bg-red-50 rounded-xl shadow-md p-6 border-t-4 border-red-500">
                <div class="flex items-center gap-2 border-b border-red-200 pb-3 mb-4">
                    <i class="fas fa-brain text-red-500 text-2xl"></i>
                    <h2 class="text-xl font-bold text-red-800">التكرار المتباعد: مهام تحتاج تركيزك</h2>
                </div>
                <div id="smart-review-list" class="space-y-2">
                    </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="days-container"></div>
        
        <div class="mt-8 flex justify-center gap-4 mb-10">
            <button onclick="resetProgress()" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded-lg transition-colors shadow-md text-sm">
                <i class="fas fa-undo ml-2"></i> تصفير البيانات
            </button>
        </div>
    </div>

    <div id="pomodoro-bar" class="fixed bottom-0 left-0 w-full bg-slate-800 text-white p-3 flex justify-between items-center shadow-2xl z-50 transition-colors duration-500" style="display: none;">
        <div class="flex items-center gap-3">
            <div class="bg-slate-900 rounded-lg px-3 py-1 border border-slate-700">
                <span id="timer-display" class="text-2xl font-mono font-bold tracking-wider">50:00</span>
            </div>
            <span id="timer-mode" class="text-xs bg-blue-500 font-bold px-2 py-1 rounded animate-pulse">جلسة تركيز</span>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleTimer()" id="timer-btn" class="bg-green-500 hover:bg-green-600 text-white w-10 h-10 rounded-full flex justify-center items-center transition-transform hover:scale-105 shadow-lg">
                <i class="fas fa-play" id="timer-icon"></i>
            </button>
            <button onclick="resetTimer()" class="bg-slate-600 hover:bg-slate-500 text-white w-10 h-10 rounded-full flex justify-center items-center transition-colors">
                <i class="fas fa-sync-alt text-sm"></i>
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCs-ho-vGUbUpPYd9WRlcAtdLxuRkvf5f4",
            authDomain: "pediatrics-app.firebaseapp.com",
            projectId: "pediatrics-app",
            storageBucket: "pediatrics-app.firebasestorage.app",
            messagingSenderId: "925584354091",
            appId: "1:925584354091:web:508c47a0f5294d426bb36e",
            measurementId: "G-H575VSQTJR"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const planData = [
            { date: "اليوم 1", title: "حجر الأساس", tasks: ["Growth, Nutrition, Vaccines", "General Principles & Psychiatry", "حل نموذج مصغر"] },
            { date: "اليوم 2", title: "حديثي الولادة", tasks: ["NRP, RDS, Jaundice, Sepsis", "Pregnancy & Childbirth", "حل 20 سؤال CMS"] },
            { date: "اليوم 3", title: "الأمراض المعدية", tasks: ["Meningitis, Exanthems, Kawasaki", "Infectious Diseases", "مراجعة التطعيمات والـ Milestones"] },
            { date: "اليوم 4", title: "التنفسي والقلب", tasks: ["Asthma, Bronchiolitis, CHD", "Pulmonary & Cardiovascular", "حل 20 سؤال CMS"] },
            { date: "اليوم 5", title: "الجهاز الهضمي", tasks: ["Dehydration, Intussusception", "Gastrointestinal & Nutrition", "حسابات السوائل (Maintenance)"] },
            { date: "اليوم 6", title: "الأعصاب والنفسية", tasks: ["Seizures, CP, Autism", "Nervous System", "حل 20 سؤال CMS"] },
            { date: "اليوم 7", title: "الدم والأورام", tasks: ["Anemias, Bleeding, Leukemia", "Hematology & Oncology", "خوارزميات الـ Anemia"] },
            { date: "اليوم 8", title: "الكلى والغدد", tasks: ["Nephritic, UTI, DKA", "Renal, Endocrine & Genetics", "حل 20 سؤال CMS"] },
            { date: "اليوم 9", title: "المحاكاة الشاملة", tasks: ["UWorld Timed: Select ALL", "نموذج CMS كامل", "مراجعة أخطاء الـ CMS"] },
            { date: "اليوم 10", title: "يوم الطوارئ", tasks: ["مراجعة سريعة للصور (X-rays)", "مراجعة القوانين والجرعات", "النوم مبكراً"] }
        ];

        let currentUser = null;
        let taskState = {};
        let hardTasks = {}; // الخوارزمية الجديدة
        let totalStudyMinutes = 0; // الخوارزمية الجديدة
        let saveTimeout = null;

        // متغيرات مؤقت بومودورو
        let timerInterval;
        let timeLeft = 50 * 60; // 50 دقيقة
        let isTimerRunning = false;
        let isStudySession = true;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('display-name').innerText = user.displayName || user.email;
                document.getElementById('user-photo').src = user.photoURL || 'https://via.placeholder.com/150';
                document.getElementById('login-section').style.display = 'none';
                loadUserData(user.uid);
            } else {
                currentUser = null;
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('pomodoro-bar').style.display = 'none';
                document.getElementById('login-section').style.display = 'block';
            }
        });

        function loginWithGoogle() {
            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('loading-text').innerText = "جاري فتح نافذة الذكاء الاصطناعي...";
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(error => {
                alert("تعذر فتح نافذة تسجيل الدخول. يرجى التأكد من عدم حظر النوافذ المنبثقة.");
                document.getElementById('loading-overlay').style.display = 'none';
            });
        }

        async function loadUserData(userId) {
            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('loading-text').innerText = "جاري مزامنة بياناتك وتحليل أدائك...";
            try {
                const doc = await db.collection("users").doc(userId).get();
                if (doc.exists) {
                    const data = doc.data();
                    taskState = data.tasks || {};
                    hardTasks = data.hardTasks || {};
                    totalStudyMinutes = data.studyMinutes || 0;
                }
            } catch (error) {
                console.error(error);
            } finally {
                renderDays();
                updateProgress();
                updateStatsUI();
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('pomodoro-bar').style.display = 'flex';
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        // بناء واجهة المهام وإضافة زر "التكرار المتباعد"
        function renderDays() {
            const container = document.getElementById('days-container');
            container.innerHTML = ''; 
            planData.forEach((day, dayIndex) => {
                const dayCard = document.createElement('div');
                dayCard.className = 'day-card bg-white rounded-xl shadow-md p-6 border-t-4 border-blue-500';
                let tasksHtml = '';
                day.tasks.forEach((task, taskIndex) => {
                    const taskId = `day${dayIndex}_task${taskIndex}`;
                    const isChecked = taskState[taskId] ? 'checked' : '';
                    const isHard = hardTasks[taskId] ? 'active' : 'text-gray-300 border-gray-200';
                    
                    tasksHtml += `
                        <div class="flex items-center justify-between border-b border-gray-100 last:border-0 p-2 hover:bg-gray-50 rounded-lg transition-colors">
                            <label class="flex items-start gap-3 cursor-pointer relative flex-1">
                                <div class="mt-1 relative flex-shrink-0">
                                    <input type="checkbox" class="task-checkbox appearance-none w-6 h-6 border-2 border-gray-300 rounded-md checked:bg-green-500 checked:border-green-500 transition-colors cursor-pointer" 
                                           id="${taskId}" ${isChecked} onchange="toggleTask('${taskId}')">
                                    <i class="fas fa-check text-white absolute top-1 right-1 text-sm pointer-events-none check-icon ${isChecked ? 'block' : 'hidden'}"></i>
                                </div>
                                <div class="text-gray-700 font-medium text-sm md:text-base ${isChecked ? 'line-through text-gray-400' : ''}" id="text_${taskId}">${task}</div>
                            </label>
                            
                            <button onclick="toggleHardTask('${taskId}', '${task}')" title="تحديد كمهمة صعبة للمراجعة" 
                                    class="hard-btn ${isHard} ml-2 p-2 rounded-full border hover:bg-red-50 transition-colors flex-shrink-0" id="btn_hard_${taskId}">
                                <i class="fas fa-fire"></i>
                            </button>
                        </div>`;
                });
                dayCard.innerHTML = `<div class="flex justify-between items-center border-b pb-3 mb-4"><h2 class="text-xl font-bold text-gray-800">${day.date}</h2><span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded">${day.title}</span></div><div class="space-y-1">${tasksHtml}</div>`;
                container.appendChild(dayCard);
            });
            
            renderSmartReview();
        }

        // دالة التكرار المتباعد
        function toggleHardTask(taskId, taskText) {
            const btn = document.getElementById(`btn_hard_${taskId}`);
            if (hardTasks[taskId]) {
                delete hardTasks[taskId];
                btn.className = "hard-btn text-gray-300 border-gray-200 ml-2 p-2 rounded-full border hover:bg-red-50 transition-colors flex-shrink-0";
            } else {
                hardTasks[taskId] = taskText;
                btn.className = "hard-btn active ml-2 p-2 rounded-full border hover:bg-red-50 transition-colors flex-shrink-0";
            }
            renderSmartReview();
            updateStatsUI();
            saveToFirestore();
        }

        // بناء صندوق المراجعة الذكية
        function renderSmartReview() {
            const container = document.getElementById('smart-review-container');
            const list = document.getElementById('smart-review-list');
            list.innerHTML = '';
            
            const hardTaskKeys = Object.keys(hardTasks);
            
            if (hardTaskKeys.length === 0) {
                container.style.display = 'none';
                return;
            }
            
            container.style.display = 'block';
            hardTaskKeys.forEach(key => {
                list.innerHTML += `
                    <div class="flex items-center gap-2 text-sm text-red-700 bg-white p-2 rounded border border-red-100">
                        <i class="fas fa-exclamation-circle text-red-400"></i>
                        <span>${hardTasks[key]}</span>
                    </div>`;
            });
        }

        function toggleTask(taskId) {
            const checkbox = document.getElementById(taskId);
            const textElement = document.getElementById(`text_${taskId}`);
            taskState[taskId] = checkbox.checked;
            if (checkbox.checked) { textElement.classList.add('line-through', 'text-gray-400'); } 
            else { textElement.classList.remove('line-through', 'text-gray-400'); }
            updateProgress();
            saveToFirestore();
        }

        function updateProgress() {
            let totalTasks = 0; planData.forEach(d => totalTasks += d.tasks.length);
            const completedTasks = Object.values(taskState).filter(v => v === true).length;
            const percentage = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);
            document.getElementById('progress-fill').style.width = `${percentage}%`;
            document.getElementById('progress-text').innerText = `نسبة الإنجاز: ${percentage}%`;
        }
        
        function updateStatsUI() {
            const hours = (totalStudyMinutes / 60).toFixed(1);
            document.getElementById('stat-hours').innerText = hours;
            document.getElementById('stat-hard').innerText = Object.keys(hardTasks).length;
        }

        // --- نظام مؤقت بومودورو ---
        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}:${s}`;
        }

        function toggleTimer() {
            const btn = document.getElementById('timer-btn');
            const icon = document.getElementById('timer-icon');
            
            if (isTimerRunning) {
                clearInterval(timerInterval);
                icon.className = "fas fa-play ml-1";
                btn.className = "bg-green-500 hover:bg-green-600 text-white w-10 h-10 rounded-full flex justify-center items-center shadow-lg";
            } else {
                icon.className = "fas fa-pause";
                btn.className = "bg-yellow-500 hover:bg-yellow-600 text-white w-10 h-10 rounded-full flex justify-center items-center shadow-lg";
                
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateTimerDisplay();
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        if (isStudySession) {
                            // انتهت 50 دقيقة دراسة
                            totalStudyMinutes += 50;
                            updateStatsUI();
                            saveToFirestore();
                            alert("🏆 بطل! انتهت جلسة التركيز. تم حفظ 50 دقيقة دراسة في رصيدك. خذ 10 دقائق راحة الآن.");
                            isStudySession = false;
                            timeLeft = 10 * 60; // 10 دقائق راحة
                            document.getElementById('timer-mode').innerText = "وقت الراحة";
                            document.getElementById('timer-mode').className = "text-xs bg-green-500 font-bold px-2 py-1 rounded animate-bounce";
                            document.getElementById('pomodoro-bar').classList.replace('bg-slate-800', 'bg-green-900');
                        } else {
                            // انتهت الراحة
                            alert("⏰ انتهى وقت الراحة! عد للتركيز لتحقيق العلامة الكاملة.");
                            isStudySession = true;
                            timeLeft = 50 * 60;
                            document.getElementById('timer-mode').innerText = "جلسة تركيز";
                            document.getElementById('timer-mode').className = "text-xs bg-blue-500 font-bold px-2 py-1 rounded animate-pulse";
                            document.getElementById('pomodoro-bar').classList.replace('bg-green-900', 'bg-slate-800');
                        }
                        isTimerRunning = false;
                        icon.className = "fas fa-play ml-1";
                        btn.className = "bg-green-500 hover:bg-green-600 text-white w-10 h-10 rounded-full flex justify-center items-center shadow-lg";
                        updateTimerDisplay();
                    }
                }, 1000);
            }
            isTimerRunning = !isTimerRunning;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isTimerRunning = false;
            isStudySession = true;
            timeLeft = 50 * 60;
            updateTimerDisplay();
            document.getElementById('timer-icon').className = "fas fa-play ml-1";
            document.getElementById('timer-btn').className = "bg-green-500 hover:bg-green-600 text-white w-10 h-10 rounded-full flex justify-center items-center shadow-lg";
            document.getElementById('timer-mode').innerText = "جلسة تركيز";
            document.getElementById('timer-mode').className = "text-xs bg-blue-500 font-bold px-2 py-1 rounded";
            document.getElementById('pomodoro-bar').classList.replace('bg-green-900', 'bg-slate-800');
        }

        function saveToFirestore() {
            if (!currentUser) return;
            document.getElementById('save-status').innerText = "جاري المزامنة...";
            clearTimeout(saveTimeout);
            
            saveTimeout = setTimeout(async () => {
                try {
                    await db.collection("users").doc(currentUser.uid).set({
                        tasks: taskState,
                        hardTasks: hardTasks,
                        studyMinutes: totalStudyMinutes,
                        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                    document.getElementById('save-status').innerText = "✔ تمت المزامنة مع الذكاء الاصطناعي";
                    setTimeout(() => document.getElementById('save-status').innerText = "", 3000);
                } catch (error) { document.getElementById('save-status').innerText = "❌ فشلت المزامنة"; }
            }, 1000); 
        }

        async function resetProgress() {
            if(confirm("تحذير: هل أنت متأكد من مسح جميع بياناتك، ساعات دراستك، والمهام الصعبة؟")) {
                taskState = {}; hardTasks = {}; totalStudyMinutes = 0;
                renderDays(); updateProgress(); updateStatsUI(); saveToFirestore();
            }
        }

        function logoutUser() { auth.signOut(); }
    </script>
</body>
</html>
